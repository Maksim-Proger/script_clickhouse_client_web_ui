<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DG Control</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        .app {
            display: flex;
            height: 100%;
        }

        /* Левая панель */
        .sidebar {
            width: 260px;
            padding: 20px;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .profile-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #444;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .sidebar button.action {
            margin-bottom: 12px;
            padding: 10px;
            cursor: pointer;
        }

        /* Основная область */
        .content {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        .data-screen {
            width: 100%;
            height: 100%;
            border: 1px solid #aaa;
            background-color: #f9f9f9;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Модальные окна */
        dialog {
            padding: 20px;
        }

        dialog button {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app">

    <!-- Левая панель -->
    <div class="sidebar">
        <button class="profile-button">👤</button>

        <button class="action" onclick="requestDG()">Получить данные из DG</button>
        <button class="action" onclick="document.getElementById('uploadDialog').showModal()">Добавить данные</button>
        <button class="action" onclick="requestCH()">Чтение данных из CH</button>
        <button class="action" onclick="document.getElementById('exportDialog').showModal()">Экспорт данных</button>
    </div>

    <!-- Правая часть -->
    <div class="content">
        <div class="data-screen">
            <h3>Область отображения данных</h3>
            <p>Здесь в дальнейшем будут отображаться данные из базы.</p>
        </div>
    </div>

</div>

<!-- Диалог загрузки файла -->
<dialog id="uploadDialog">
    <h3>Загрузка файла</h3>
    <input type="file">
    <br>
    <button onclick="this.closest('dialog').close()">Закрыть</button>
</dialog>

<!-- Диалог экспорта -->
<dialog id="exportDialog">
    <h3>Экспорт данных</h3>
    <label>
        <input type="radio" name="exportFormat"> PDF
    </label><br>
    <label>
        <input type="radio" name="exportFormat"> Word
    </label><br>
    <button onclick="this.closest('dialog').close()">Закрыть</button>
</dialog>

<script>
async function requestDG() {
    try {
        const response = await fetch('http://192.168.100.113:8000/dg/request');
        const data = await response.json();
        alert(JSON.stringify(data));
    } catch (e) {
        alert("Ошибка запроса");
    }
}
async function requestCH() {
    try {
        const sqlQuery = encodeURIComponent("SELECT * FROM my_table LIMIT 10");
        const response = await fetch(`http://127.0.0.1:8000/ch/read?query=${sqlQuery}`);
        const data = await response.json();

        const screen = document.querySelector(".data-screen");
        screen.innerHTML = "<h3>Результаты из ClickHouse</h3><pre>" + JSON.stringify(data, null, 2) + "</pre>";
    } catch (e) {
        alert("Ошибка запроса CH: " + e.message);
    }
}

</script>

</body>
</html>
