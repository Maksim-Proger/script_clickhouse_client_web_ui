<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DG Control</title>
    <link rel="stylesheet" href="style.css"> <!-- Вынесенный CSS -->
</head>
<body>

<div class="app">

    <!-- Левая панель -->
    <div class="sidebar">
        <button class="profile-button">👤</button>

        <button class="action" id="btnDG">Получить данные из DG</button>
        <button class="action" id="btnUpload">Добавить данные</button>
        <button class="action" id="btnCH">Чтение данных из CH</button>
        <button class="action" id="btnExport">Экспорт данных</button>
    </div>

    <!-- Правая часть -->
    <div class="content">
        <div class="data-screen">
            <h3>Область отображения данных</h3>
            <p>Здесь в дальнейшем будут отображаться данные из базы.</p>
            <div id="data-list"></div> <!-- Контейнер для CH данных -->
        </div>
    </div>

</div>

<!-- Диалоги -->
<dialog id="uploadDialog">
    <h3>Загрузка файла</h3>
    <input type="file">
    <br>
    <button onclick="this.closest('dialog').close()">Закрыть</button>
</dialog>

<dialog id="exportDialog">
    <h3>Экспорт данных</h3>
    <label><input type="radio" name="exportFormat"> PDF</label><br>
    <label><input type="radio" name="exportFormat"> Word</label><br>
    <button onclick="this.closest('dialog').close()">Закрыть</button>
</dialog>

<script src="script.js"></script> <!-- Вынесенный JS -->

</body>
</html>
